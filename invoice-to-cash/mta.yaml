_schema-version: 3.3.0
ID: invoice-to-cash
description: Invoice to Cash CAP Application
version: 1.0.0

modules:

# ── CAP Node.js Service ───────────────────────────────────
- name: invoice-to-cash-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: invoice-to-cash-auth
  - name: invoice-to-cash-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci

# ── HANA DB Deployer ──────────────────────────────────────
- name: invoice-to-cash-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: invoice-to-cash-db
  parameters:
    buildpack: nodejs_buildpack

# ── App Router ────────────────────────────────────────────
- name: invoice-to-cash
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: invoice-to-cash-auth
  - name: invoice-to-cash-html5-runtime
  - name: invoice-to-cash-destination-service
    group: destinations
    properties:
      forwardAuthToken: false
      name: ui5
      url: https://ui5.sap.com
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M

# ── HTML5 App Deployer ────────────────────────────────────
- name: invoice-to-cash-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: invoice-to-cash-auth
  - name: srv-api
  - name: invoice-to-cash-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - browse.zip
      name: invoicetocashbrowse
      target-path: app/
    - artifacts:
      - customers.zip
      name: customers
      target-path: app/

# ── Invoices Fiori App ────────────────────────────────────
- name: invoicetocashbrowse
  type: html5
  path: app/browse
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm ci
    - npm run build
    supported-platforms: []

# ── Customers Fiori App ───────────────────────────────────
- name: customers
  type: html5
  path: app/customers
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []

resources:

# ── XSUAA ─────────────────────────────────────────────────
- name: invoice-to-cash-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
      role-collections:
      - description: Invoice to Cash Admin
        name: admin (invoice-to-cash ${org}-${space})
        role-template-references:
        - $XSAPPNAME.admin
      tenant-mode: dedicated
      xsappname: invoice-to-cash-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api

# ── HANA Cloud HDI Container ──────────────────────────────
- name: invoice-to-cash-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared

# ── HTML5 App Repository ──────────────────────────────────
- name: invoice-to-cash-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host

- name: invoice-to-cash-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime

# ── Destination Service ───────────────────────────────────
- name: invoice-to-cash-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: false
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: invoice-to-cash-destination-service
    service-plan: lite

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production